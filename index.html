<!--
  index.html — Landing / Auth Page

  This is the first page users see when they visit the site.
  Responsibilities:
  - Display the Login form (email + password)
  - Display the Register form (toggle between login and register)
  - On successful login/register, redirect the user to dashboard.html
  - On failed auth, show an inline error message below the form

  Loads: js/auth/firebase.js
-->

  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/SignUp</title>
  </head>
  <body>
      <form method="post" id="signUpForm">
        <h2>Sign Up</h2>
        <input type="text" id="signUpFirstName" placeholder="First Name" required>
        <input type="text" id="signUpLastName" placeholder="Last Name" required>
        <input type="email" id="signUpEmail" placeholder="Email" required>
        <input type="password" id="signUpPassword" placeholder="Password" required>
        <button type="submit" id="signUpBtn">Register</button>
      </form>
      <p id="greet"></p>

      <form method="post" id="signInForm">
        <h2>Sign In</h2>
        <input type="email" id="signInEmail" placeholder="Email" required>
        <input type="password" id="signInPassword" placeholder="Password" required>
        <button type="submit" id="signInBtn">Login</button>
      </form>
      
      <script src="js/auth/firebase.js" type="module"></script>
  </body>
  </html>
