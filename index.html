<!--
  index.html — Landing / Auth Page

  This is the first page users see when they visit the site.
  Responsibilities:
  - Display the Login form (email + password)
  - Display the Register form (toggle between login and register)
  - On successful login/register, redirect the user to dashboard.html
  - On failed auth, show an inline error message below the form

  Loads: js/auth/firebase.js
-->

  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index</title>
  </head>
  <body>
      <form id="sign-up-form">
        <h2>Sign Up</h2>
        <input type="email" id="signup-email" placeholder="Email" required>
        <input type="password" id="signup-password" placeholder="Password" required>
        <button type="submit" id="signup-btn">Register</button>
        <!-- <p>Already have an account? <a href="#" id="show-login">Login here</a></p> -->
      </form>
      
      <script src="js/auth/firebase.js" type="module"></script>
  </body>
  </html>
