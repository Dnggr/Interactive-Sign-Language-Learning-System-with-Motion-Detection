<!--
  dashboard.html — User Dashboard / Home Page

  The main hub after a user logs in.
  Responsibilities:
  - Display the user's name and overall progress summary
  - Show all 3 levels (Beginner, Intermediate, Advanced) as cards
  - Inside each level card, list the individual lessons
  - Visually lock lessons that have not been unlocked yet (padlock icon)
  - Show completion badges and high scores for finished lessons
  - Provide a Logout button that signs the user out via Firebase Auth

  Loads: js/auth/firebase.js, js/ui/dashboard.js, js/lessons/curriculum.js
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
</head>
<body>
    <h1>Welcome to Your Dashboard</h1>
    <div>First Name: <span id="loggedInUserFirstName"></span></div>
    <div>Last Name: <span id="loggedInUserLastName"></span></div>
    <div>Email: <span id="loggedInUserEmail"></span></div>
    <button id="logOutBtn">Logout</button>

    <script src="data/dashboardData.js" type="module"></script>
</body>
</html>
